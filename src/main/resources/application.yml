spring:
    application:
        name: ms-usuarios  #Nombre del microservicio
    datasource:
        url: jdbc:mysql://localhost:3306/usuario_db
        username: root
        password: ""
        driver-class-name: com.mysql.cj.jdbc.Driver
    jpa:
        database-platform: org.hibernate.dialect.MySQLDialect
        hibernate:
            ddl-auto: update
        properties:
            hibernate:
                format_sql: true
        show-sql: false

server:
    port: 8081


# ========== SWAGGER ==========
springdoc:
    api-docs:
        enabled: true
        path: /api/usuarios/v3/api-docs
    swagger-ui:
        enabled: true
        path: /api/usuarios/swagger-ui.html

    servers:
        - url: http://localhost:8080
          description: Servidor a través del Gateway (Pruebas de Seguridad)
        - url: http://localhost:8081
          description: Servidor Local Directo (ms-usuarios)

# ========== CONFIGURACIÓN EUREKA ==========
eureka:
    client:
        serviceUrl:
            defaultZone: http://localhost:8761/eureka/  # URL del Servidor Eureka
        register-with-eureka: true
        fetch-registry: true
    instance:
        instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
        hostname: localhost
        prefer-ip-address: false
        health-check-url: http://localhost:8081/actuator/health
        status-page-url: http://localhost:8081/actuator/info

# ========== ACTUATOR (Para Health Check) ==========
management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics
    endpoint:
        health:
            show-details: always

# ========== LOGGING ==========aaa
logging:
    level:
        root: INFO
        com.Usuario.GestionUsuarios: DEBUG
        org.springframework.web: DEBUG
        org.springframework.security: DEBUG

